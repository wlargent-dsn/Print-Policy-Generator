# Configuration for Automatic Print GPO Generator
# This file defines mappings, servers, paths, and settings for the script

# Site mappings: ADDS site name to printer name prefix
site_mappings:
  TAMPA: "0311"  # Example: printers starting with "0311" are in TAMPA site
  MIAMI: "0456"  # Add more as needed

# List of print servers to poll for printer data
print_servers:
  - "DSN-PRINT-01"  # Example server hostname

# Path to the output GPO XML file (will be overwritten)
gpo_xml_path: "Printers.xml"

# Logging configuration
logging:
  directory: "logs"  # Directory for log files
  rotation_days: 30  # Days before log rotation (default 30)

# SMTP settings for error alerts (plain text, no authentication)
smtp:
  server: "smtp.company.com"  # SMTP server hostname
  port: 25  # SMTP port (usually 25 for plain text)
  from_email: "alerts@company.com"  # From address for alerts
  to_email: "admin@company.com"  # To address for alerts

# Printer-specific site overrides (optional)
# Maps printer name to specific ADDS site, overriding prefix-based determination
printer_overrides:
  # "SPECIAL-PRINTER": "MIAMI"  # Uncomment and modify as needed